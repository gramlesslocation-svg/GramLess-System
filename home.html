<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale=1.0">
    <title>GramLess - Home</title>
  <style>
    /* Color Variables & Reset */
        :root {
            --bg-dark: #121212;
            --card-bg: #FFFFFF;
            --text-dark: #1C1C1C;
            --text-muted: #757575;
            --primary-yellow: #FFDE4D;
            --search-bg: #F5F5F7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #FFFFFF; /* Kept clean white as requested */
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .home-container {
            width: 100%;
            max-width: 600px; /* Perfect sizing for mobile and desktop screens */
            margin-top: 10px;
        }

        /* Modern Search Bar Layout */
        .search-wrapper {
            position: relative;
            width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
        }

        /* The handle of the search icon magnifying glass */
        .search-icon::after {
            content: '';
            position: absolute;
            right: -5px;
            bottom: -5px;
            width: 6px;
            height: 2px;
            background: var(--text-muted);
            transform: rotate(45deg);
            transform-origin: left top;
        }

        .search-input {
            width: 100%;
            padding: 16px 16px 16px 50px; /* Space on left so text doesn't hit the icon */
            background-color: var(--search-bg);
            border: none;
            border-radius: 14px; /* Matches the smooth rounded corners from your image */
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
            transition: all 0.2s ease;
        }

        /* Subtle focus effect when clicking the search box */
        .search-input:focus {
            background-color: #EFEFEF;
            box-shadow: 0 0 0 1px #DDD;
          }
  </style>
  
  </head>
  <body>

    <div class="home-container">

      <div class="search-wrapper">
        <div class="search-icon"></div>
        <input type="text" class="search-input" placeholder="Search for an item...">
      </div>
    </div>
    
  </body>
</html>
