<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GramLess - Home</title>
    <style>
        :root {
            --bg-dark: #121212;
            --text-dark: #1C1C1C;
            --text-muted: #757575;
            --primary-yellow: #FFDE4D;
            --search-bg: #F5F5F7;
            --border-color: #E0E0E0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #FFFFFF;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .home-container {
            width: 100%;
            max-width: 800px;
            margin-top: 10px;
        }

        /* Top Search Bar */
        .search-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 30px;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
        }

        .search-icon::after {
            content: '';
            position: absolute;
            right: -5px;
            bottom: -5px;
            width: 6px;
            height: 2px;
            background: var(--text-muted);
            transform: rotate(45deg);
        }

        .search-input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background-color: var(--search-bg);
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
        }

        /* Grid for the 4 Items */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 500px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }

        .product-card {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        }

        .product-image-box {
            width: 100%;
            height: 180px;
            background-color: #FAFAFA;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .product-image-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .product-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="home-container">
        <!-- Search -->
        <div class="search-wrapper">
            <div class="search-icon"></div>
            <input type="text" class="search-input" placeholder="Search for an item or a product...">
        </div>

        <!-- 4 Varieties Grid -->
        <div class="product-grid">
            <!-- Item 1 -->
            <div class="product-card" onclick="openProduct('steam', 'GramLess Steam Basmati Rice')">
                <div class="product-image-box">
                    <!-- Replace with your actual picture filename later -->
                    <img src="steam-rice.png" alt="Steam Rice">
                </div>
                <div class="product-title">Steam Rice</div>
                <div class="product-subtitle">Premium Basmati</div>
            </div>
            
            <!-- Item 2 -->
            <div class="product-card" onclick="openProduct('golden', 'GramLess Golden Sella Rice')">
                <div class="product-image-box">
                    <img src="golden-rice.png" alt="Golden Rice">
                </div>
                <div class="product-title">Golden Rice</div>
                <div class="product-subtitle">Premium Basmati</div>
            </div>

            <!-- Item 3 -->
            <div class="product-card" onclick="openProduct('white', 'GramLess Classic White Rice')">
                <div class="product-image-box">
                    <img src="white-rice.png" alt="White Rice">
                </div>
                <div class="product-title">White Rice</div>
                <div class="product-subtitle">Premium Basmati</div>
            </div>

            <!-- Item 4 -->
            <div class="product-card" onclick="openProduct('creamy', 'GramLess Creamy Sella Rice')">
                <div class="product-image-box">
                    <img src="creamy-rice.png" alt="Creamy Rice">
                </div>
                <div class="product-title">Creamy Rice</div>
                <div class="product-subtitle">Premium Basmati</div>
            </div>
        </div>
    </div>

    <script>
        function openProduct(id, fullName) {
            // Sends the data directly inside the page URL parameters
            window.location.href = `product.html?id=${id}&name=${encodeURIComponent(fullName)}`;
        }
    </script>
</body>
</html>
