<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GramLess - Product Details</title>
    <style>
        :root {
            --bg-dark: #1C1C1C;
            --text-dark: #1C1C1C;
            --text-muted: #757575;
            --primary-yellow: #FFDE4D;
            --border-color: #E0E0E0;
            --button-grey: #707070;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #FFFFFF;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .product-container {
            width: 100%;
            max-width: 500px;
            margin-top: 10px;
        }

        .back-nav {
            margin-bottom: 20px;
            cursor: pointer;
            color: var(--text-dark);
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        .image-showcase {
            width: 100%;
            height: 300px;
            background-color: #FAFAFA;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .image-showcase img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .product-name {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #C9A304;
            margin-bottom: 20px;
        }

        .meta-line {
            font-size: 0.95rem;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        .meta-line span {
            color: var(--text-muted);
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border-color);
            margin: 20px 0;
        }

        .selection-label {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        .weight-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            background-color: #FFF;
            margin-bottom: 25px;
        }

        .action-row {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #FAFAFA;
        }

        .quantity-selector input {
            width: 45px;
            border: none;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            background: transparent;
            outline: none;
        }

        .step-btns {
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-color);
        }

        .step-btn {
            background: none;
            border: none;
            width: 25px;
            height: 22px;
            cursor: pointer;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .step-btn:first-child {
            border-bottom: 1px solid var(--border-color);
        }

        .btn-add-cart {
            flex: 1;
            background-color: var(--button-grey);
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }

        .btn-add-cart:hover {
            background-color: #555555;
        }

        .info-tabs {
            border-top: 1px solid var(--border-color);
        }

        .tab-item {
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .tab-item.active {
            color: var(--text-dark);
            border-bottom: 2px solid var(--text-dark);
        }
    </style>
</head>
<body>

    <div class="product-container">
        <div class="back-nav" onclick="history.back()">&larr; Back to Store</div>

        <div class="image-showcase">
            <img id="display-img" src="" alt="Rice Bag View">
        </div>

        <h1 id="display-name" class="product-name">Loading Product...</h1>
        <div id="display-price" class="product-price">Select size to show price</div>

        <div class="meta-line">SKU: <span>N/A</span></div>
        <div class="meta-line">Category: <span>Basmati Rice</span></div>

        <hr>

        <label class="selection-label">KG:</label>
        <select id="weight-dropdown" class="weight-select" onchange="updatePrice()">
            <option value="" disabled selected>Choose an option</option>
            <option value="0.8">0.8KG Bag</option>
            <option value="2.4">2.4KG Bag</option>
            <option value="9.6">9.6KG Bag</option>
        </select>

        <div class="action-row">
            <div class="quantity-selector">
                <input type="text" id="qty-count" value="1" readonly>
                <div class="step-btns">
                    <button class="step-btn" onclick="adjustQty(1)">&#9650;</button>
                    <button class="step-btn" onclick="adjustQty(-1)">&#9660;</button>
                </div>
            </div>
            <button class="btn-add-cart" onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="info-tabs">
            <div class="tab-item active">Description</div>
            <div class="tab-item">Additional Information</div>
            <div class="tab-item">Reviews (0)</div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id') || 'steam';
        const productName = urlParams.get('name') || 'Premium Rice Bag';

        const pricingMatrix = {
            white: { "0.8": 2.10, "2.4": 6.15, "9.6": 23.20 },
            creamy: { "0.8": 2.10, "2.4": 6.15, "9.6": 23.20 },
            golden: { "0.8": 2.15, "2.4": 6.33, "9.6": 23.90 },
            steam: { "0.8": 2.18, "2.4": 6.40, "9.6": 24.20 }
        };

        window.onload = function() {
            document.getElementById('display-name').innerText = productName;
            let imageSource = `${productId}-rice.png`;

            const testImg = new Image();
            testImg.src = imageSource;
            testImg.onerror = function() {
                document.getElementById('display-img').src = "https://placehold.co" + encodeURIComponent(productName);
            };

            document.getElementById('display-img').src = imageSource;
        };

        function adjustQty(amount) {
            const input = document.getElementById('qty-count');
            let current = parseInt(input.value);
            current += amount;
            if (current < 1) current = 1;
            input.value = current;
            
            updatePrice();
        }

        function updatePrice() {
            const size = document.getElementById('weight-dropdown').value;
            
            if (!size) {
                document.getElementById('display-price').innerText = "Select size to show price";
                return;
            }

            const qty = parseInt(document.getElementById('qty-count').value);
            const unitPrice = pricingMatrix[productId][size];
            const totalPrice = unitPrice * qty;

            document.getElementById('display-price').innerText = `$${totalPrice.toFixed(2)} USD`;
        }

        function addToCart() {
            const sizeDropdown = document.getElementById('weight-dropdown');
            const sizeValue = sizeDropdown.value;
            const sizeText = sizeDropdown.options[sizeDropdown.selectedIndex].text;
            const qty = parseInt(document.getElementById('qty-count').value);

            if (!sizeValue) {
                alert('Please pick a KG package size first!');
                return;
            }

            const finalUnitPrice = pricingMatrix[productId][sizeValue];

            let cartItems = JSON.parse(localStorage.getItem('gramless_cart')) || [];
            let existingItem = cartItems.find(item => item.id === productId && item.size === sizeText);

            if (existingItem) {
                existingItem.qty += qty;
            } else {
                cartItems.push({
                    id: productId,
                    name: productName,
                    size: sizeText,
                    qty: qty,
                    price: finalUnitPrice
                });
            }

            localStorage.setItem('gramless_cart', JSON.stringify(cartItems));
            alert(`Added ${qty} bag(s) of ${productName} (${sizeText}) to your cart!`);
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
