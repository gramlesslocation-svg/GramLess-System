<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GramLess - Product Details</title>
    <style>
        :root {
            --bg-dark: #1C1C1C;
            --text-dark: #1C1C1C;
            --text-muted: #757575;
            --primary-yellow: #FFDE4D;
            --border-color: #E0E0E0;
            --button-grey: #707070;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #FFFFFF;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .product-container {
            width: 100%;
            max-width: 500px;
            margin-top: 10px;
        }

        /* Back Navigation */
        .back-nav {
            margin-bottom: 20px;
            cursor: pointer;
            color: var(--text-dark);
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        /* Product Gallery Box */
        .image-showcase {
            width: 100%;
            height: 300px;
            background-color: #FAFAFA;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .image-showcase img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* Information Details */
        .product-name {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #C9A304;
            margin-bottom: 20px;
        }

        .meta-line {
            font-size: 0.95rem;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        .meta-line span {
            color: var(--text-muted);
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border-color);
            margin: 20px 0;
        }

        /* Option Selections */
        .selection-label {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        .weight-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            background-color: #FFF;
            margin-bottom: 25px;
        }

        /* Purchase Flex Row controls */
        .action-row {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #FAFAFA;
        }

        .quantity-selector input {
            width: 45px;
            border: none;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            background: transparent;
            outline: none;
        }

        .step-btns {
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-color);
        }

        .step-btn {
            background: none;
            border: none;
            width: 25px;
            height: 22px;
            cursor: pointer;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .step-btn:first-child {
            border-bottom: 1px solid var(--border-color);
        }

        .btn-add-cart {
            flex: 1;
            background-color: var(--button-grey);
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }

        .btn-add-cart:hover {
            background-color: #555555;
        }

        /* Bottom Menu System tabs */
        .info-tabs {
            border-top: 1px solid var(--border-color);
        }

        .tab-item {
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .tab-item.active {
            color: var(--text-dark);
            border-bottom: 2px solid var(--text-dark);
        }
    </style>
</head>
<body>

    <div class="product-container">
        <!-- Back navigation link -->
        <div class="back-nav" onclick="history.back()">← Back to Store</div>

        <!-- Product Image Showcase window -->
        <div class="image-showcase">
            <img id="display-img" src="" alt="Rice Bag View">
        </div>

        <!-- Details Information Group -->
        <h1 id="display-name" class="product-name">Loading Product...</h1>
        <div id="display-price" class="product-price">$ --.--</div>

        <div class="meta-line">SKU: <span>N/A</span></div>
        <div class="meta-line">Category: <span>Basmati Rice</span></div>

        <hr>

        <!-- KG Selection Dropdown Layout -->
        <label class="selection-label">KG:</label>
        <select id="weight-dropdown" class="weight-select" onchange="updatePrice()">
            <option value="" disabled selected>Choose an option</option>
            <option value="0.8">800g Bag</option>
            <option value="2.4">2.4kg Bag</option>
            <option value="9.6">9.6kg Bag</option>
            <option value="10">10kg Bulk Sack</option>
            <option value="20">20kg Restaurant Sack</option>
        </select>

        <!-- Purchase Interaction Buttons -->
        <div class="action-row">
            <div class="quantity-selector">
                <input type="text" id="qty-count" value="1" readonly>
                <div class="step-btns">
                    <button class="step-btn" onclick="adjustQty(1)">▲</button>
                    <button class="step-btn" onclick="adjustQty(-1)">▼</button>
                </div>
            </div>
            <button class="btn-add-cart" onclick="addToCart()">Add to Cart</button>
        </div>

        <!-- Product Extra Information Menu Bars -->
        <div class="info-tabs">
            <div class="tab-item active">Description</div>
            <div class="tab-item">Additional Information</div>
            <div class="tab-item">Reviews (0)</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id') || 'steam';
        const productName = urlParams.get('name') || 'Premium Rice Bag';

        window.onload = function() {
            document.getElementById('display-name').innerText = productName;
            
            // Connects the page directly to your uploaded .png files
            let imageSource = `${productId}-rice.png`;

            // Error backup: If the .png image file isn't uploaded yet, show a clean visual card label instead of a broken icon
            const testImg = new Image();
            testImg.src = imageSource;
            testImg.onerror = function() {
                document.getElementById('display-img').src = "https://placehold.co" + encodeURIComponent(productName);
            };

            document.getElementById('display-img').src = imageSource;
            document.getElementById('display-price').innerText = "Select size to show price";
        };

        function adjustQty(amount) {
            const input = document.getElementById('qty-count');
            let current = parseInt(input.value);
            current += amount;
            if (current < 1) current = 1;
            input.value = current;
        }

        function updatePrice() {
            const size = document.getElementById('weight-dropdown').value;
            let basePrice = 0;

            if (size === "0.8") basePrice = 4.50;
            if (size === "2.4") basePrice = 12.00;
            if (size === "9.6") basePrice = 45.00;
            if (size === "10")  basePrice = 48.00;
            if (size === "20")  basePrice = 90.00;

            document.getElementById('display-price').innerText = `$${basePrice.toFixed(2)}`;
        }

        function addToCart() {
            const size = document.getElementById('weight-dropdown').value;
            const qty = document.getElementById('qty-count').value;

            if (!size) {
                alert('Please pick a KG package size first!');
                return;
            }
            alert(`Added ${qty} pack(s) of the ${size}kg size option directly into your order session!`);
        }
    </script>
</body>
</html>
