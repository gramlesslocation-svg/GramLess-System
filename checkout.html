<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GramLess - Checkout Dispatch</title>
    <!-- Open-Source Mapping Engine Style Sheet -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        :root {
            --bg-dark: #121212;
            --text-dark: #1C1C1C;
            --text-muted: #757575;
            --primary-yellow: #FFDE4D;
            --yellow-hover: #E5C740;
            --border-color: #F0F0F2;
            --gray-light: #F7F7F9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #FAFAFB;
            color: var(--text-dark);
            padding-bottom: 140px;
            display: flex;
            justify-content: center;
        }

        .checkout-wrapper {
            width: 100%;
            max-width: 550px;
            background-color: #FFFFFF;
            min-height: 100vh;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.02);
            position: relative;
        }

        .top-nav {
            display: flex;
            align-items: center;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-dark);
        }

        .nav-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-left: 15px;
        }

        .notice-banner {
            background-color: #FFFDEB;
            border: 1px solid #FFE885;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #7A6500;
            font-weight: 600;
        }

        .section-card {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            color: var(--bg-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .address-display-box {
            padding: 10px 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .btn-change-location {
            background-color: var(--bg-dark);
            color: var(--primary-yellow);
            border: none;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
        }

        .driver-textarea {
            width: 100%;
            height: 90px;
            padding: 12px;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            background-color: var(--gray-light);
        }

        /* Fullscreen Map Overlay Container */
        .map-overlay-modal {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 550px;
            height: 100vh;
            background-color: #FFFFFF;
            z-index: 10000;
            transition: transform 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .map-overlay-modal.active {
            transform: translateX(-50%) translateY(0);
        }

        .map-header {
            padding: 15px 20px;
            background-color: var(--bg-dark);
            color: #FFFFFF;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #lebanon-live-map {
            flex-grow: 1;
            width: 100%;
            height: 70%;
        }

        .map-footer-confirm {
            padding: 15px 20px;
            background-color: #FFFFFF;
            border-top: 1px solid var(--border-color);
        }

        /* Form Overlay Details Input Sheet */
        .details-form-modal {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 550px;
            height: 100vh;
            background-color: #FFFFFF;
            z-index: 10001;
            transition: transform 0.4s ease;
            padding: 20px;
            overflow-y: auto;
        }

        .details-form-modal.active {
            transform: translateX(-50%) translateY(0);
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .form-group input {
            padding: 12px;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        /* Reference Image Aligned Bottom Sticky Console Panel */
        .fixed-checkout-footer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 550px;
            background-color: #FFFFFF;
            border-top: 1px solid var(--border-color);
            padding: 16px 20px 24px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
            z-index: 9999;
        }

        .btn-add-items-link {
            flex: 1;
            background-color: #FFFFFF;
            color: var(--text-dark);
            border: 1px solid #E5E5EA;
            padding: 15px 10px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            white-space: nowrap;
        }

        .btn-place-order-action {
            flex: 1.8;
            background-color: #00A887; /* Green highlight matching image reference queries */
            color: #FFFFFF;
            border: none;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
        }

        .btn-primary-block {
            width: 100%;
            background-color: var(--bg-dark);
            color: var(--primary-yellow);
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="checkout-wrapper">
        <div class="top-nav">
            <button class="back-btn" onclick="window.location.href='cart.html'">&larr;</button>
            <h2 class="nav-title">Checkout</h2>
        </div>

        <!-- Announcement Notification Tag -->
        <div class="notice-banner">
            🔔 GramLess Alert: You will receive a direct delivery confirmation timeline notification shortly after placing your order.
        </div>

        <!-- Delivery Mapping Card -->
        <div class="section-card">
            <div class="section-title">
                <span>Delivery Address</span>
                <button id="main-addr-action-btn" class="btn-change-location" onclick="openInteractiveMapModal()">Add Address</button>
            </div>
            <div id="address-status-display" class="address-display-box">
                No pinned address found. Tap "Add Address" to drop your delivery marker pin.
            </div>
        </div>

        <!-- Notes Input Card -->
        <div class="section-card">
            <h3 class="section-title">Driver Instructions</h3>
            <textarea id="driver-notes-input" class="driver-textarea" placeholder="Add specific guidance directions for your driver here..."></textarea>
        </div>
    </div>

    <!-- Live Map Overlay Modal Canvas -->
    <div id="map-modal-wrapper" class="map-overlay-modal">
        <div class="map-header">
            <h3>Pin Delivery Point</h3>
            <button style="background:none; border:none; color:#fff; cursor:pointer;" onclick="closeInteractiveMapModal()">Cancel</button>
        </div>
        <div id="lebanon-live-map"></div>
        <div class="map-footer-confirm">
            <button class="btn-primary-block" onclick="commitPinnedLocationCoordinates()">Confirm Pinned Location</button>
        </div>
    </div>

    <!-- Text Inputs Capture overlay Sheet -->
    <div id="form-modal-wrapper" class="details-form-modal">
        <h2 style="font-weight:800; border-bottom:2px solid var(--border-color); padding-bottom:10px;">Address Details</h2>
        <div class="form-grid">
            <div class="form-group"><label>Contact Name *</label><input type="text" id="field-name" placeholder="John Doe"></div>
    <!-- Leaflet Structural Graphics mapping CDN libraries scripts -->
    <script src="https://unpkg.com"></script>
    <script>
        let mapInstance = null;
        let mapMarker = null;
        let temporalCoordinates = null;

        window.onload = function() {
            calculateCheckoutTotals();
        };

        function calculateCheckoutTotals() {
            let cartItems = JSON.parse(localStorage.getItem('gramless_cart')) || [];
            let subtotalAccumulator = 0;

            cartItems.forEach(item => {
                subtotalAccumulator += (item.price * item.qty);
            });

            document.getElementById('footer-checkout-price').innerText = `$${subtotalAccumulator.toFixed(2)}`;
        }

        function openInteractiveMapModal() {
            document.getElementById('map-modal-wrapper').classList.add('active');

            if (!mapInstance) {
                // Focus Map camera view center over Lebanon grids points coordinates mapping parameters
                mapInstance = L.map('lebanon-live-map').setView([33.8938, 35.5018], 10);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 18,
                    attribution: '© OpenStreetMap contributors'
                }).addTo(mapInstance);

                const centerPosition = mapInstance.getCenter();
                mapMarker = L.marker(centerPosition, { draggable: true }).addTo(mapInstance);
                temporalCoordinates = centerPosition;

                mapMarker.on('dragend', function(event) {
                    temporalCoordinates = mapMarker.getLatLng();
                });

                mapInstance.on('click', function(event) {
                    mapMarker.setLatLng(event.latlng);
                    temporalCoordinates = event.latlng;
                });
            } else {
                setTimeout(() => { mapInstance.invalidateSize(); }, 200);
            }
        }

        function closeInteractiveMapModal() {
            document.getElementById('map-modal-wrapper').classList.remove('active');
        }

        function commitPinnedLocationCoordinates() {
            closeInteractiveMapModal();
            document.getElementById('form-modal-wrapper').classList.add('active');
        }

        function saveAddressFormDetailsAndClose() {
            const name = document.getElementById('field-name').value.trim();
            const market = document.getElementById('field-market').value.trim();
            const phone = document.getElementById('field-phone').value.trim();
            const street = document.getElementById('field-street').value.trim();
            const building = document.getElementById('field-building').value.trim();
            const apartment = document.getElementById('field-apartment').value.trim();

            if (!name || !market || !phone) {
                alert('Please fill out Name, Market, and Phone fields.');
                return;
            }

            const addressDetailsObject = {
                name, market, phone, street, building, apartment,
                coordinates: `${temporalCoordinates.lat.toFixed(4)}, ${temporalCoordinates.lng.toFixed(4)}`
            };

            localStorage.setItem('gramless_checkout_address', JSON.stringify(addressDetailsObject));
            document.getElementById('form-modal-wrapper').classList.remove('active');

            document.getElementById('address-status-display').innerHTML = `
                <div style="color:#1c1c1c;">
                    <strong>${market}</strong> (${name})<br>
                    📞 ${phone}<br>
                    ${street ? street + ', ' : ''} ${building ? 'Bldg: ' + building + ', ' : ''} ${apartment ? 'Apt: ' + apartment : ''}<br>
                    <span style="font-size:0.8rem; color:grey;">Pinned GPS: ${addressDetailsObject.coordinates}</span>
                </div>
            `;
            document.getElementById('main-addr-action-btn').innerText = "Change";
        }

        function commitFinalCorporateOrder() {
            const addressDataString = localStorage.getItem('gramless_checkout_address');
            let cartItems = JSON.parse(localStorage.getItem('gramless_cart')) || [];
            const driverNotes = document.getElementById('driver-notes-input').value.trim();

            if (cartItems.length === 0) {
                alert('Your cart is empty!');
                return;
            }

            if (!addressDataString) {
                alert('Please specify your delivery address on the map first.');
                return;
            }

            const parsedAddress = JSON.parse(addressDataString);
            let globalOrdersPool = JSON.parse(localStorage.getItem('gramless_orders')) || [];
            let orderedItemsSummary = cartItems.map(item => `${item.qty}x ${item.name} (${item.size})`).join(', ');

            let finalNetCostValue = 0;
            cartItems.forEach(item => { finalNetCostValue += (item.price * item.qty); });

            const trackingCode = 'ORD-' + Math.floor(20000 + Math.random() * 70000);

            globalOrdersPool.push({
                id: trackingCode,
                clientName: parsedAddress.name,
                marketName: parsedAddress.market,
                phone: parsedAddress.phone,
                itemsSummary: orderedItemsSummary,
                location: `${parsedAddress.street || 'Pinned'} (${parsedAddress.coordinates})`,
                buildingDetails: `Bldg: ${parsedAddress.building || 'N/A'}, Apt: ${parsedAddress.apartment || 'N/A'}`,
                driverInstructions: driverNotes || 'None specified',
                totalCost: `$${finalNetCostValue.toFixed(2)} USD`,
                status: 'Pending Review',
                eta: 'Awaiting dispatch scheduling'
            });

            localStorage.setItem('gramless_orders', JSON.stringify(globalOrdersPool));

            const messageString = `🚨 *GRAMLESS NEW ORDER LOGGED* 🚨\n\n` +
                                  `• *Order ID:* ${trackingCode}\n` +
                                  `• *Market:* ${parsedAddress.market}\n` +
                                  `• *Contact:* ${parsedAddress.name} (${parsedAddress.phone})\n` +
                                  `• *Items:* ${orderedItemsSummary}\n` +
                                  `• *GPS Pin:* ${parsedAddress.coordinates}\n` +
                                  `• *Driver Notes:* ${driverNotes || 'None'}\n` +
                                  `• *Total Price:* $${finalNetCostValue.toFixed(2)} USD`;

            const adminWhatsAppNumber = "96171601621"; 
            const whatsappDispatchLink = `https://whatsapp.com{adminWhatsAppNumber}&text=${encodeURIComponent(messageString)}`;

            localStorage.removeItem('gramless_cart');
            localStorage.removeItem('gramless_checkout_address');

            alert(`🎉 Order ${trackingCode} Submitted! You will receive a direct delivery notification shortly.`);
            window.location.href = whatsappDispatchLink;
        }
    </script>
</body>
</html>
