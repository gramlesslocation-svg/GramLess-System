<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GramLess - Checkout Dispatch</title>
    <!-- Leaflet.js Mapping Engine Style CDN -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        :root {
            --bg-dark: #121212;
            --text-dark: #1C1C1C;
            --text-muted: #757575;
            --primary-yellow: #FFDE4D;
            --yellow-hover: #E5C740;
            --border-color: #F0F0F2;
            --gray-light: #F7F7F9;
            --green-accent: #00A887;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #FAFAFB;
            color: var(--text-dark);
            padding-bottom: 140px;
            display: flex;
            justify-content: center;
        }

        .checkout-wrapper {
            width: 100%;
            max-width: 550px;
            background-color: #FFFFFF;
            min-height: 100vh;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.02);
            position: relative;
        }

        /* Nav Header */
        .top-nav {
            display: flex;
            align-items: center;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-dark);
        }

        .nav-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-left: 15px;
        }

        /* Section Cards Layout */
        .section-card {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            color: var(--bg-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid var(--primary-yellow);
            padding-left: 8px;
        }

        /* Address Badge Component */
        .address-placeholder-box {
            padding: 10px 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .saved-address-text strong {
            color: var(--text-dark);
            font-size: 1.05rem;
        }

        .btn-change-location {
            background-color: var(--bg-dark);
            color: var(--primary-yellow);
            border: none;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Driver Instructions Textarea */
        .driver-textarea {
            width: 100%;
            height: 90px;
            padding: 12px;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            background-color: var(--gray-light);
        }

        .driver-textarea:focus {
            border-color: var(--bg-dark);
            background-color: #FFFFFF;
        }

        /* Notification Banner Label */
        .notice-banner {
            background-color: #FFFDEB;
            border: 1px solid #FFE885;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #7A6500;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Items Summary */
        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: var(--text-muted);
        }
        .summary-row.bold {
            font-weight: 700;
            color: var(--text-dark);
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            margin-top: 10px;
        }

        /* Interactive Fullscreen Sliding Mapping Container */
        .map-overlay-modal {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 550px;
            height: 100vh;
            background-color: #FFFFFF;
            z-index: 10000;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .map-overlay-modal.active {
            transform: translateX(-50%) translateY(0);
        }

        .map-header {
            padding: 15px 20px;
            background-color: var(--bg-dark);
            color: #FFFFFF;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-close-map {
            background: none;
            border: none;
            color: #FFFFFF;
            font-size: 1.1rem;
            cursor: pointer;
        }

        #lebanon-live-map {
            flex-grow: 1;
            width: 100%;
        }

        .map-footer-confirm {
            padding: 15px 20px;
            background-color: #FFFFFF;
            border-top: 1px solid var(--border-color);
        }

        /* Address Details Modal Panel */
        .details-form-modal {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 550px;
            height: 100vh;
            background-color: #FFFFFF;
            z-index: 10001;
            transition: transform 0.4s ease;
            padding: 20px;
            overflow-y: auto;
        }

        .details-form-modal.active {
            transform: translateX(-50%) translateY(0);
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .form-group label span {
            color: red;
        }

        .form-group input {
            padding: 12px;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--bg-dark);
        }

        /* Sticky Action Console Footer Bar */
        .checkout-fixed-footer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 550px;
            background-color: #FFFFFF;
            border-top: 2px solid var(--bg-dark);
            padding: 16px 20px 24px 20px;
            display: flex;
            justify-space: space-between;
            align-items: center;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
            z-index: 9999;
        }

        .footer-total-box {
            display: flex;
            flex-direction: column;
        }

        .footer-total-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .footer-grand-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .btn-place-order-action {
            background-color: var(--bg-dark);
            color: var(--primary-yellow);
            border: none;
            padding: 16px 36px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.2s;
        }

        .btn-place-order-action:hover {
            background-color: #222222;
        }

        .btn-primary-block {
            width: 100%;
            background-color: var(--bg-dark);
            color: var(--primary-yellow);
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="checkout-wrapper">
        <!-- Top Title Navigation -->
        <div class="top-nav">
            <button class="back-btn" onclick="window.location.href='cart.html'">&larr;</button>
            <h2 class="nav-title">Checkout</h2>
        </div>

        <!-- NOTIFICATION DISPATCH ANNOUNCEMENT BANNER -->
        <div class="notice-banner">
            <span>🔔</span>
            <span>Important: You will receive a direct delivery confirmation timeline notification shortly after placing your order.</span>
        </div>

        <!-- DELIVERY ADDRESS DISPATCH CARD -->
        <div class="section-card">
            <div class="section-title">
                <span>Delivery Address</span>

<script src="https://unpkg.com"></script>
    <script>
        let mapInstance = null;
        let mapMarker = null;
        let temporalCoordinates = null;

        // Auto-extract logged-in customer identity profiles
        const currentUserData = JSON.parse(sessionStorage.getItem('currentUser')) || { email: "guest_buyer@gramless.com", name: "Guest Customer" };

        window.onload = function() {
            calculateCheckoutTotals();
        };

        function calculateCheckoutTotals() {
            let cartItems = JSON.parse(localStorage.getItem('gramless_cart')) || [];
            let subtotalAccumulator = 0;

            cartItems.forEach(item => {
                subtotalAccumulator += (item.price * item.qty);
            });

            document.getElementById('summary-subtotal-val').innerText = `$${subtotalAccumulator.toFixed(2)} USD`;
            document.getElementById('summary-grand-total-val').innerText = `$${subtotalAccumulator.toFixed(2)} USD`;
            document.getElementById('footer-total-price').innerText = `$${subtotalAccumulator.toFixed(2)}`;
        }

        function openInteractiveMapModal() {
            document.getElementById('map-modal-wrapper').classList.add('active');

            if (!mapInstance) {
                // Focus camera directly over central Lebanon grids (Matn/Beirut bounds tracking)
                mapInstance = L.map('lebanon-live-map').setView([33.8938, 35.5018], 10);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 18,
                    attribution: '© OpenStreetMap contributors'
                }).addTo(mapInstance);

                const centerPosition = mapInstance.getCenter();
                mapMarker = L.marker(centerPosition, { draggable: true }).addTo(mapInstance);
                temporalCoordinates = centerPosition;

                mapMarker.on('dragend', function(event) {
                    temporalCoordinates = mapMarker.getLatLng();
                });

                mapInstance.on('click', function(event) {
                    mapMarker.setLatLng(event.latlng);
                    temporalCoordinates = event.latlng;
                });
            } else {
                setTimeout(() => { mapInstance.invalidateSize(); }, 200);
            }
        }

        function closeInteractiveMapModal() {
            document.getElementById('map-modal-wrapper').classList.remove('active');
        }

        function commitPinnedLocationCoordinates() {
            closeInteractiveMapModal();
            document.getElementById('form-modal-wrapper').classList.add('active');
        }

        function saveAddressFormDetailsAndClose() {
            const name = document.getElementById('field-name').value.trim();
            const market = document.getElementById('field-market').value.trim();
            const phone = document.getElementById('field-phone').value.trim();
            const street = document.getElementById('field-street').value.trim();
            const building = document.getElementById('field-building').value.trim();
            const apartment = document.getElementById('field-apartment').value.trim();

            if (!name || !market || !phone) {
                alert('Please fill out all required fields marked with an asterisk (*).');
                return;
            }

            const addressDetailsObject = {
                name, market, phone, street, building, apartment,
                coordinates: `${temporalCoordinates.lat.toFixed(4)}, ${temporalCoordinates.lng.toFixed(4)}`
            };

            localStorage.setItem('gramless_checkout_address', JSON.stringify(addressDetailsObject));
            document.getElementById('form-modal-wrapper').classList.remove('active');

            const displayContainer = document.getElementById('address-status-display');
            displayContainer.innerHTML = `
                <div class="saved-address-text">
                    <strong>${market}</strong> (${name})<br>
                    📞 ${phone}<br>
                    ${street ? street + ', ' : ''} ${building ? 'Bldg: ' + building + ', ' : ''} ${apartment ? 'Apt/Suite: ' + apartment : ''}<br>
                    <span style="font-size:0.8rem; color:grey; font-family:monospace;">Pinned GPS: ${addressDetailsObject.coordinates}</span>
                </div>
            `;

            document.getElementById('main-addr-action-btn').innerText = "Change";
        }

        // 🚀 COMPILES THE ENTIRE PAYLOAD AND ROUTES TO ADMIN LOGS IMMEDIATELY
        function commitFinalCorporateOrder() {
            const addressDataString = localStorage.getItem('gramless_checkout_address');
            let cartItems = JSON.parse(localStorage.getItem('gramless_cart')) || [];
            const driverNotes = document.getElementById('driver-notes-input').value.trim();

            if (cartItems.length === 0) {
                alert('Your cart is empty! Return to the store catalog to add premium products.');
                return;
            }

            if (!addressDataString) {
                alert('Please specify your delivery address and drop your location pin marker on the map first.');
                return;
            }

            const parsedAddress = JSON.parse(addressDataString);
            let globalOrdersPool = JSON.parse(localStorage.getItem('gramless_orders')) || [];

            let orderedItemsSummary = cartItems.map(item => `${item.qty}x ${item.name} (${item.size})`).join(', ');

            let finalNetCostValue = 0;
            cartItems.forEach(item => { finalNetCostValue += (item.price * item.qty); });

            const corporateTrackingCode = 'ORD-' + Math.floor(20000 + Math.random() * 70000);

            // Create payload package with customer account email fully attached
            const finalOrderPayload = {
                id: corporateTrackingCode,
                userAccountEmail: currentUserData.email, // Attached log email
                clientName: parsedAddress.name,
                marketName: parsedAddress.market,
                phone: parsedAddress.phone,
                itemsSummary: orderedItemsSummary,
                location: `${parsedAddress.street || 'Pinned'} (${parsedAddress.coordinates})`,
                buildingDetails: `Bldg: ${parsedAddress.building || 'N/A'}, Apt: ${parsedAddress.apartment || 'N/A'}`,
                driverInstructions: driverNotes || 'None specified',
                totalCost: `$${finalNetCostValue.toFixed(2)} USD`,
                status: 'Pending Review',
                eta: 'Awaiting dispatch scheduling'
            };

            // Commit order parameters directly into system order registries
            globalOrdersPool.push(finalOrderPayload);
            localStorage.setItem('gramless_orders', JSON.stringify(globalOrdersPool));

            // --- ADMIN MESSAGE OUTBOUND CHANNELS ---
            // Format order parameter lines into an urgent corporate dispatch text block
            const messageString = `🚨 *GRAMLESS NEW ORDER LOGGED* 🚨\n\n` +
                                  `• *Order ID:* ${corporateTrackingCode}\n` +
                                  `• *User Email:* ${currentUserData.email}\n` +
                                  `• *Market:* ${parsedAddress.market}\n` +
                                  `• *Contact:* ${parsedAddress.name} (${parsedAddress.phone})\n` +
                                  `• *Items:* ${orderedItemsSummary}\n` +
                                  `• *Coordinates:* ${parsedAddress.coordinates}\n` +
                                  `• *Address:* ${parsedAddress.street || 'N/A'}, ${parsedAddress.building || 'N/A'}\n` +
                                  `• *Driver Notes:* ${driverNotes || 'None'}\n` +
                                  `• *Bill Total:* $${finalNetCostValue.toFixed(2)} USD`;

            // Open direct communication links to pass the structured order info package to your admin desk via WhatsApp API routing hooks
            // Replace the digits below with your actual phone number to route incoming data streams straight to your handset!
            const adminWhatsAppNumber = "96171601621"; 
            const encodedText = encodeURIComponent(messageString);
            const whatsappDispatchLink = `https://whatsapp.com{adminWhatsAppNumber}&text=${encodedText}`;

            // Flush cart array memories completely clean
            localStorage.removeItem('gramless_cart');
            localStorage.removeItem('gramless_checkout_address');

            alert(`🎉 Order ${corporateTrackingCode} Submitted Successfully!\n\nYou will receive a direct delivery time confirmation notification shortly.`);
            
            // Push data packet directly into outbound messaging nodes to complete transmission channels
            window.location.href = whatsappDispatchLink;
        }
    </script>
            </body>
            </html>
