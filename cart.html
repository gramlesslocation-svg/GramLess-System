<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GramLess - My Cart</title>
    <style>
        :root {
            --bg-dark: #121212;
            --text-dark: #1C1C1C;
            --text-muted: #757575;
            --primary-yellow: #FFDE4D;
            --yellow-hover: #E5C740;
            --border-color: #F0F0F2;
            --card-bg: #FFFFFF;
            --toters-green: #00A887;
            --toters-hover: #008F72;
            --gray-light: #F7F7F9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #FAFAFB;
            color: var(--text-dark);
            padding: 0 0 140px 0; /* Space for the gorgeous bottom bar */
            display: flex;
            justify-content: center;
        }

        .cart-wrapper {
            width: 100%;
            max-width: 550px;
            background-color: #FFFFFF;
            min-height: 100vh;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.02);
        }

        /* Top Header Layout from reference */
        .cart-top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 20px;
            margin-bottom: 15px;
        }

        .back-arrow-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-dark);
            font-weight: 300;
        }

        .nav-title {
            font-size: 1.25rem;
            font-weight: 700;
            flex-grow: 1;
            margin-left: 15px;
        }

        /* Top Crown Token Badge */
        .points-badge {
            background-color: #E8F9F6;
            color: var(--toters-green);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Company Brand Label Container Card */
        .vendor-header-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 5px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .vendor-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .vendor-logo-box {
            background-color: #121212; /* Brand identity */
            color: #FFFFFF;
            font-weight: 800;
            font-size: 0.75rem;
            padding: 6px 10px;
            border-radius: 8px;
            letter-spacing: -0.5px;
        }

        .vendor-name {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .vendor-arrow {
            font-size: 1.2rem;
            color: var(--text-dark);
            font-weight: bold;
        }

        /* Product Cards Layout Stack */
        .items-list-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .item-row-card {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .item-main-details {
            display: flex;
            gap: 15px;
            flex: 1;
        }

        .product-thumbnail {
            width: 75px;
            height: 75px;
            object-fit: contain;
            background-color: var(--gray-light);
            border-radius: 12px;
            padding: 6px;
        }

        .product-meta h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .product-meta-weight {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .product-meta-price {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Pure Reference UI Quantity Steps Controller Container */
        .qty-control-capsule {
            display: flex;
            align-items: center;
            background-color: var(--gray-light);
            border-radius: 20px;
            padding: 4px 6px;
            gap: 10px;
            align-self: flex-start;
            margin-top: 5px;
        }

        .btn-qty-action {
            background: none;
            border: none;
            width: 24px;
            height: 24px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-current-value {
            font-size: 0.95rem;
            font-weight: 700;
            min-width: 14px;
            text-align: center;
        }

        /* Subtotal summary grid divider lines */
        .subtotal-summary-section {
            padding: 20px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            border-bottom: 1px dashed #D1D1D6;
            margin-bottom: 25px;
        }

        /* Location Input Field */
        .cart-address-box {
            padding: 0 5px;
            margin-bottom: 20px;
        }

        .cart-address-box label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 8px;
        }

        .cart-address-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }

        .cart-address-box input:focus {
            border-color: #121212;
        }

        /* Sticky Action Checkout Console Footnote Bar */
        .fixed-action-footer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 550px;
            background-color: #FFFFFF;
            border-top: 1px solid var(--border-color);
            padding: 16px 20px 24px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
            z-index: 9999;
        }

        .btn-add-items-link {
            background-color: #FFFFFF;
            color: var(--text-dark);
            border: 1px solid #E5E5EA;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            white-space: nowrap;
        }

        .btn-checkout-green-action {
            flex-grow: 1;
            background-color: var(--toters-green); /* Image specific accent matching query */
            color: #FFFFFF;
            border: none;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .btn-checkout-green-action:hover {
            background-color: var(--toters-hover);
        }

        .empty-cart-text {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 0;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="cart-wrapper">
        <!-- Top App Navigation Header -->
        <div class="cart-top-nav">
            <button class="back-arrow-btn" onclick="window.location.href='home.html'">&larr;</button>
            <h2 class="nav-title">My Cart</h2>
            <div class="points-badge">👑 <span id="cart-item-count-badge">0</span></div>
        </div>

        <!-- Vendor Header Banner Information Card -->
        <div class="vendor-header-card">
            <div class="vendor-info">
                <div class="vendor-logo-box">GramLess</div>
                <h3 class="vendor-name">GramLess Hub</h3>
            </div>
            <div class="vendor-arrow">&rsaquo;</div>
        </div>

        <!-- Products Stack Container -->
        <div id="cart-items-list-stack" class="items-list-container">
            <!-- Dynamically populated rows via JS storage arrays -->
        </div>

        <!-- Reference Summary Layout Row -->
        <div class="subtotal-summary-section">
            <span>Subtotal</span>
            <span id="summary-subtotal-price">$0.00</span>
        </div>

        <!-- Delivery Address Capture Component -->
        <div class="cart-address-box">
            <label for="user-delivery-location">Delivery Location</label>
            <input type="text" id="user-delivery-location" placeholder="Enter delivery street address...">
        </div>
    </div>

    <!-- STICKY ACTION FOOTER CONTROLS CONSOLE -->
    <div class="fixed-action-footer">
        <a href="home.html" class="btn-add-items-link">Add items</a>
